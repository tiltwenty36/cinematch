<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CinéMatch - Trouve ton film ce soir</title>
    
    <style>
        :root {
            --bg-color: #141414;
            --card-bg: #181818;
            --accent-color: #E50914; 
            --accent-hover: #B81D24;
            --text-color: #FFFFFF;
            --text-muted: #AAAAAA;
            --border-color: #333333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }

        .container {
            width: 100%;
            max-width: 1000px; /* Élargi pour accueillir les nouveaux filtres harmonieusement */
            text-align: center;
        }

        header h1 {
            font-size: 2.5rem;
            color: var(--accent-color);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 800;
        }

        header p {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }

        .filters-section {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .filters-grid {
            display: grid;
            /* Grille responsive de 1 à 5 colonnes selon l'écran */
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        .filter-group label {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filter-group select {
            background-color: #2f2f2f;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 0.75rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .filter-group select:focus {
            border-color: var(--accent-color);
        }

        /* Conteneur spécifique pour la fourchette de notes alignée */
        .rating-range-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
        }

        .btn-trigger {
            background-color: var(--accent-color);
            color: var(--text-color);
            border: none;
            padding: 1rem 2rem;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            width: 100%;
            max-width: 400px;
        }

        .btn-trigger:hover {
            background-color: var(--accent-hover);
        }

        .btn-trigger:active {
            transform: scale(0.98);
        }

        .btn-trigger:disabled {
            background-color: #555;
            cursor: not-allowed;
        }

        .result-section {
            margin-top: 2rem;
            display: none; 
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .result-section.show {
            opacity: 1;
            transform: translateY(0);
        }

        .movie-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            text-align: left;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .movie-poster {
            width: 100%;
            height: 400px;
            object-fit: cover;
            background-color: #222;
        }
