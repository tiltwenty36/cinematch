<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMatch - Find Your Movie Tonight</title>
    
    <style>
        :root {
            --bg-color: #141414;
            --card-bg: #181818;
            --accent-color: #E50914; /* Netflix Red */
            --accent-hover: #B81D24;
            --text-color: #FFFFFF;
            --text-muted: #AAAAAA;
            --border-color: #333333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5rem;
            color: var(--accent-color);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 800;
        }

        header p {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }

        .filters-section {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .filters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        .filter-group label {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filter-group select {
            background-color: #2f2f2f;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 0.75rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .filter-group select:focus {
            border-color: var(--accent-color);
        }

        .rating-range-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
        }

        .btn-trigger {
            background-color: var(--accent-color);
            color: var(--text-color);
            border: none;
            padding: 1rem 2rem;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            width: 100%;
            max-width: 400px;
        }

        .btn-trigger:hover {
            background-color: var(--accent-hover);
        }

        .btn-trigger:active {
            transform: scale(0.98);
        }

        .btn-trigger:disabled {
            background-color: #555;
            cursor: not-allowed;
        }

        .result-section {
            margin-top: 2rem;
            display: none; 
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .result-section.show {
            opacity: 1;
            transform: translateY(0);
        }

        .movie-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            text-align: left;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .movie-poster {
            width: 100%;
            height: 400px;
            object-fit: cover;
            background-color: #222;
        }

        .movie-details {
            padding: 1.5rem;
        }

        .movie-title {
            font-size: 1.8rem;
            margin-bottom: 0.3rem;
            font-weight: 700;
        }

        /* Styling for the newly added Director field */
        .movie-director {
            font-size: 1rem;
            color: var(--accent-color);
            font-weight: 600;
            margin-bottom: 0.8rem;
        }

        .movie-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .badge {
            background-color: #2f2f2f;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .badge-accent {
            background-color: rgba(229, 9, 20, 0.2);
            color: var(--accent-color);
        }

        .badge-rating {
            background-color: rgba(255, 193, 7, 0.2);
            color: #ffc107;
        }

        .movie-overview {
            color: var(--text-muted);
            line-height: 1.6;
            font-size: 1rem;
        }

        .no-match-message {
            color: #ffc107;
            font-weight: 600;
            margin-top: 2rem;
            display: none;
            background-color: rgba(255, 193, 7, 0.1);
            padding: 1rem;
            border-radius: 6px;
            border: 1px solid rgba(255, 193, 7, 0.2);
        }

        @media (min-width: 600px) {
            .movie-card {
                flex-direction: row;
                height: 450px;
            }

            .movie-poster {
                width: 40%;
                height: 100%;
            }

            .movie-details {
                width: 60%;
                padding: 2rem;
                display: flex;
                flex-direction: column;
                justify-content: center;
                overflow-y: auto;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>CineMatch</h1>
            <p>Find Your Movie Tonight</p>
        </header>

        <section class="filters-section">
            <div class="filters-grid">
                <div class="filter-group">
                    <label for="genre-select">Genre</label>
                    <select id="genre-select">
                        <option value="all">All Genres</option>
                        <option value="28">Action</option>
                        <option value="35">Comedy</option>
                        <option value="18">Drama</option>
                        <option value="878">Sci-Fi</option>
                        <option value="27">Horror</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="year-select">Era</label>
                    <select id="year-select">
                        <option value="all">All Eras</option>
                        <option value="50s">50s</option>
                        <option value="60s">60s</option>
                        <option value="70s">70s</option>
                        <option value="80s">80s</option>
                        <option value="90s">90s</option>
                        <option value="2000s">2000s</option>
                        <option value="2010s">2010s</option>
                        <option value="recent">Recent (2020+)</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="lang-select">Original Language</label>
                    <select id="lang-select">
                        <option value="all">All Languages</option>
                        <option value="en">English</option>
                        <option value="fr">French</option>
                        <option value="ja">Japanese</option>
                        <option value="it">Italian</option>
                        <option value="de">German</option>
                        <option value="zh">Mandarin</option>
                        <option value="pt">Portuguese</option>
                        <option value="ru">Russian</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="country-select">Country of Origin</label>
                    <select id="country-select">
                        <option value="all">All Countries</option>
                        <option value="US">United States</option>
                        <option value="GB">United Kingdom</option>
                        <option value="FR">France</option>
                        <option value="BE">Belgium</option>
                        <option value="CH">Switzerland</option>
                        <option value="PT">Portugal</option>
                        <option value="IT">Italy</option>
                        <option value="BR">Brazil</option>
                        <option value="DE">Germany</option>
                        <option value="CN">China</option>
                        <option value="HK">Hong Kong</option>
                        <option value="JP">Japan</option>
                        <option value="TW">Taiwan</option>
                        <option value="RU">Russia</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label>Rating Range</label>
                    <div class="rating-range-container">
                        <select id="rating-min-select">
                            <option value="1">Min: 1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                            <option value="5">5</option>
                            <option value="6">6</option>
                            <option value="7">7</option>
                            <option value="8">8</option>
                            <option value="9">9</option>
                        </select>
                        <select id="rating-max-select">
                            <option value="10">Max: 10</option>
                            <option value="9">9</option>
                            <option value="8">8</option>
                            <option value="7">7</option>
                            <option value="6">6</option>
                            <option value="5">5</option>
                            <option value="4">4</option>
                            <option value="3">3</option>
                            <option value="2">2</option>
                        </select>
                    </div>
                </div>
            </div>

            <button id="match-btn" class="btn-trigger">Roll a Random Movie</button>
        </section>

        <div id="error-msg" class="no-match-message">
            No movies match this criteria, try another combination!
        </div>

        <section id="result-container" class="result-section">
            <div class="movie-card">
                <img id="movie-img" src="" alt="Movie Poster" class="movie-poster">
                <div class="movie-details">
                    <h2 id="movie-title" class="movie-title">Movie Title</h2>
                    <div id="movie-director" class="movie-director">Director: Unknown</div>
                    <div class="movie-meta">
                        <span id="movie-rating" class="badge badge-rating">Rating</span>
                        <span id="movie-year" class="badge">Year</span>
                        <span id="movie-lang" class="badge">Language</span>
                    </div>
                    <p id="movie-overview" class="movie-overview">Movie description summary...</p>
                </div>
            </div>
        </section>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            const TMDB_API_KEY = "a22cc070653d990b7947884e821738de";
            const BASE_URL = "https://api.themoviedb.org/3";
            const IMAGE_BASE_URL = "https://image.tmdb.org/t/p/w500";

            // DOM Elements References
            const genreSelect = document.getElementById('genre-select');
            const yearSelect = document.getElementById('year-select');
            const langSelect = document.getElementById('lang-select');
            const countrySelect = document.getElementById('country-select');
            const ratingMinSelect = document.getElementById('rating-min-select');
            const ratingMaxSelect = document.getElementById('rating-max-select');
            
            const matchBtn = document.getElementById('match-btn');
            const resultContainer = document.getElementById('result-container');
            const errorMsg = document.getElementById('error-msg');

            const movieImg = document.getElementById('movie-img');
            const movieTitle = document.getElementById('movie-title');
            const movieDirector = document.getElementById('movie-director');
            const movieYear = document.getElementById('movie-year');
            const movieLang = document.getElementById('movie-lang');
            const movieRating = document.getElementById('movie-rating');
            const movieOverview = document.getElementById('movie-overview');

            // English badges dictionary mapper
            const langLabels = { 
                'en': 'English', 'fr': 'French', 'ja': 'Japanese',
                'it': 'Italian', 'de': 'German', 'zh': 'Mandarin',
                'pt': 'Portuguese', 'ru': 'Russian'
            };

            async function fetchRandomMovie() {
                matchBtn.disabled = true;
                matchBtn.textContent = "Rolling...";

                let url = `${BASE_URL}/discover/movie?api_key=${TMDB_API_KEY}&language=en-US&include_adult=false&sort_by=popularity.desc`;

                if (genreSelect.value !== 'all') {
                    url += `&with_genres=${genreSelect.value}`;
                }
                if (langSelect.value !== 'all') {
                    url += `&with_original_language=${langSelect.value}`;
                }
                if (countrySelect.value !== 'all') {
                    url += `&with_origin_country=${countrySelect.value}`;
                }

                url += `&vote_average.gte=${ratingMinSelect.value}`;
                url += `&vote_average.lte=${ratingMaxSelect.value}`;

                if (yearSelect.value !== 'all') {
                    if (yearSelect.value === '50s') url += `&primary_release_date.gte=1950-01-01&primary_release_date.lte=1959-12-31`;
                    if (yearSelect.value === '60s') url += `&primary_release_date.gte=1960-01-01&primary_release_date.lte=1969-12-31`;
                    if (yearSelect.value === '70s') url += `&primary_release_date.gte=1970-01-01&primary_release_date.lte=1979-12-31`;
                    if (yearSelect.value === '80s') url += `&primary_release_date.gte=1980-01-01&primary_release_date.lte=1989-12-31`;
                    if (yearSelect.value === '90s') url += `&primary_release_date.gte=1990-01-01&primary_release_date.lte=1999-12-31`;
                    if (yearSelect.value === '2000s') url += `&primary_release_date.gte=2000-01-01&primary_release_date.lte=2009-12-31`;
                    if (yearSelect.value === '2010s') url += `&primary_release_date.gte=2010-01-01&primary_release_date.lte=2019-12-31`;
                    if (yearSelect.value === 'recent') url += `&primary_release_date.gte=2020-01-01`;
                }

                try {
                    const response = await fetch(url);
                    const data = await response.json();

                    if (!data.results || data.results.length === 0) {
                        showError();
                        return;
                    }

                    const maxPages = Math.min(data.total_pages, 10);
                    const randomPage = Math.floor(Math.random() * maxPages) + 1;

                    const finalResponse = await fetch(`${url}&page=${randomPage}`);
                    const finalData = await finalResponse.json();

                    const filteredList = finalData.results.filter(m => m.overview && m.poster_path);

                    if (filteredList.length === 0) {
                        showError();
                        return;
                    }

                    const randomIndex = Math.floor(Math.random() * filteredList.length);
                    const chosenMovie = filteredList[randomIndex];

                    // Fetch the director's profile details before updating the interface components
                    const directorName = await fetchDirector(chosenMovie.id);
                    
                    displayMovie(chosenMovie, directorName);

                } catch (err) {
                    console.error("TMDB Api Error Stream:", err);
                    showError();
                } finally {
                    matchBtn.disabled = false;
                    matchBtn.textContent = "Roll a Random Movie";
                }
            }

            // Sub-routine asynchronous method to fetch and target technical crew data mapping
            async function fetchDirector(movieId) {
                try {
                    const creditsUrl = `${BASE_URL}/movie/${movieId}/credits?api_key=${TMDB_API_KEY}`;
                    const response = await fetch(creditsUrl);
                    const creditsData = await response.json();
                    
                    if (creditsData && creditsData.crew) {
                        // Filters layout arrays searching explicitly for structural 'Director' target
                        const directorObject = creditsData.crew.find(member => member.job === 'Director');
                        return directorObject ? directorObject.name : "Unknown Director";
                    }
                    return "Unknown Director";
                } catch (error) {
                    console.error("Error looking up technical crew endpoints:", error);
                    return "Unknown Director";
                }
            }

            function displayMovie(movie, director) {
                errorMsg.style.display = 'none';

                movieTitle.textContent = movie.title;
                movieDirector.textContent = `Director: ${director}`;
                movieOverview.textContent = movie.overview;
                movieRating.textContent = `⭐ ${movie.vote_average.toFixed(1)}/10`;
                movieYear.textContent = movie.release_date ? movie.release_date.substring(0, 4) : 'N/A';
                movieLang.textContent = langLabels[movie.original_language] || movie.original_language.toUpperCase();
                
                movieImg.src = `${IMAGE_BASE_URL}${movie.poster_path}`;
                movieImg.alt = `${movie.title} Official Movie Poster`;

                resultContainer.style.display = 'block';
                setTimeout(() => {
                    resultContainer.classList.add('show');
                }, 20);
            }

            function showError() {
                resultContainer.classList.remove('show');
                resultContainer.style.display = 'none';
                errorMsg.style.display = 'block';
            }

            matchBtn.addEventListener('click', fetchRandomMovie);
        });
    </script>
</body>
</html>
