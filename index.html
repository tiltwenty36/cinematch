<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CinéMatch - Trouve ton film ce soir</title>
    
    <style>
        :root {
            --bg-color: #141414;
            --card-bg: #181818;
            --accent-color: #E50914; 
            --accent-hover: #B81D24;
            --text-color: #FFFFFF;
            --text-muted: #AAAAAA;
            --border-color: #333333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }

        .container {
            width: 100%;
            max-width: 800px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5rem;
            color: var(--accent-color);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 800;
        }

        header p {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }

        .filters-section {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .filters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        .filter-group label {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filter-group select {
            background-color: #2f2f2f;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 0.75rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .filter-group select:focus {
            border-color: var(--accent-color);
        }

        .btn-trigger {
            background-color: var(--accent-color);
            color: var(--text-color);
            border: none;
            padding: 1rem 2rem;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            width: 100%;
            max-width: 400px;
        }

        .btn-trigger:hover {
            background-color: var(--accent-hover);
        }

        .btn-trigger:active {
            transform: scale(0.98);
        }

        .btn-trigger:disabled {
            background-color: #555;
            cursor: not-allowed;
        }

        .result-section {
            margin-top: 2rem;
            display: none; 
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .result-section.show {
            opacity: 1;
            transform: translateY(0);
        }

        .movie-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            text-align: left;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .movie-poster {
            width: 100%;
            height: 400px;
            object-fit: cover;
            background-color: #222;
        }

        .movie-details {
            padding: 1.5rem;
        }

        .movie-title {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        .movie-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .badge {
            background-color: #2f2f2f;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .badge-accent {
            background-color: rgba(229, 9, 20, 0.2);
            color: var(--accent-color);
        }

        .badge-rating {
            background-color: rgba(255, 193, 7, 0.2);
            color: #ffc107;
        }

        .movie-overview {
            color: var(--text-muted);
            line-height: 1.6;
            font-size: 1rem;
        }

        .no-match-message {
            color: #ffc107;
            font-weight: 600;
            margin-top: 2rem;
            display: none;
            background-color: rgba(255, 193, 7, 0.1);
            padding: 1rem;
            border-radius: 6px;
            border: 1px solid rgba(255, 193, 7, 0.2);
        }

        @media (min-width: 600px) {
            .movie-card {
                flex-direction: row;
                height: 450px;
            }

            .movie-poster {
                width: 40%;
                height: 100%;
            }

            .movie-details {
                width: 60%;
                padding: 2rem;
                display: flex;
                flex-direction: column;
                justify-content: center;
                overflow-y: auto;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>CinéMatch</h1>
            <p>Trouve ton film ce soir</p>
        </header>

        <section class="filters-section">
            <div class="filters-grid">
                <div class="filter-group">
                    <label for="genre-select">Genre</label>
                    <select id="genre-select">
                        <option value="all">Tous les genres</option>
                        <option value="28">Action</option>
                        <option value="35">Comédie</option>
                        <option value="18">Drame</option>
                        <option value="878">Science-Fiction</option>
                        <option value="27">Horreur</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="year-select">Année</label>
                    <select id="year-select">
                        <option value="all">Toutes les époques</option>
                        <option value="90s">Années 90</option>
                        <option value="2000s">Années 2000</option>
                        <option value="2010s">Années 2010</option>
                        <option value="recent">Récent (2020+)</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="lang-select">Langue</label>
                    <select id="lang-select">
                        <option value="all">Toutes les langues</option>
                        <option value="fr">Français</option>
                        <option value="en">Anglais</option>
                    </select>
                </div>
            </div>

            <button id="match-btn" class="btn-trigger">Sélectionner un film au hasard</button>
        </section>

        <div id="error-msg" class="no-match-message">
            Aucun film ne correspond à cette recherche ultra-précise, tentez une autre combinaison !
        </div>

        <section id="result-container" class="result-section">
            <div class="movie-card">
                <img id="movie-img" src="" alt="Affiche du film" class="movie-poster">
                <div class="movie-details">
                    <h2 id="movie-title" class="movie-title">Titre du film</h2>
                    <div class="movie-meta">
                        <span id="movie-rating" class="badge badge-rating">Note</span>
                        <span id="movie-year" class="badge">Année</span>
                        <span id="movie-lang" class="badge">Langue</span>
                    </div>
                    <p id="movie-overview" class="movie-overview">Résumé du film...</p>
                </div>
            </div>
        </section>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            // Constantes de configuration TMDB avec ta clé injectée
            const TMDB_API_KEY = "a22cc070653d990b7947884e821738de";
            const BASE_URL = "https://api.themoviedb.org/3";
            const IMAGE_BASE_URL = "https://image.tmdb.org/t/p/w500";

            // Sélections des éléments de l'interface
            const genreSelect = document.getElementById('genre-select');
            const yearSelect = document.getElementById('year-select');
            const langSelect = document.getElementById('lang-select');
            const matchBtn = document.getElementById('match-btn');
            const resultContainer = document.getElementById('result-container');
            const errorMsg = document.getElementById('error-msg');

            const movieImg = document.getElementById('movie-img');
            const movieTitle = document.getElementById('movie-title');
            const movieYear = document.getElementById('movie-year');
            const movieLang = document.getElementById('movie-lang');
            const movieRating = document.getElementById('movie-rating');
            const movieOverview = document.getElementById('movie-overview');

            // Traduction des ISO de langue pour l'affichage des badges
            const langLabels = { 'en': 'Anglais', 'fr': 'Français' };

            // Fonction asynchrone connectée à l'API de découverte
            async function fetchRandomMovie() {
                // UI feedback : désactive le bouton pour éviter le spam de clics
                matchBtn.disabled = true;
                matchBtn.textContent = "Recherche en cours...";

                // Initialisation de la requête Discover en français, excluant le contenu adulte
                let url = `${BASE_URL}/discover/movie?api_key=${TMDB_API_KEY}&language=fr-FR&include_adult=false&sort_by=popularity.desc`;

                // Injection du filtre Genre
                if (genreSelect.value !== 'all') {
                    url += `&with_genres=${genreSelect.value}`;
                }

                // Injection du filtre Langue
                if (langSelect.value !== 'all') {
                    url += `&with_original_language=${langSelect.value}`;
                }

                // Injection du filtre Année via les paramètres de date de sortie de TMDB
                if (yearSelect.value !== 'all') {
                    if (yearSelect.value === '90s') url += `&primary_release_date.gte=1990-01-01&primary_release_date.lte=1999-12-31`;
                    if (yearSelect.value === '2000s') url += `&primary_release_date.gte=2000-01-01&primary_release_date.lte=2009-12-31`;
                    if (yearSelect.value === '2010s') url += `&primary_release_date.gte=2010-01-01&primary_release_date.lte=2019-12-31`;
                    if (yearSelect.value === 'recent') url += `&primary_release_date.gte=2020-01-01`;
                }

                try {
                    // Étape 1 : Obtenir le volume global de résultats pour la pagination
                    const response = await fetch(url);
                    const data = await response.json();

                    if (!data.results || data.results.length === 0) {
                        showError();
                        return;
                    }

                    // Étape 2 : Choisir une page au hasard (limité au top 10 des pages pour garder des films qualitatifs)
                    const maxPages = Math.min(data.total_pages, 10);
                    const randomPage = Math.floor(Math.random() * maxPages) + 1;

                    // Étape 3 : Lancer la requête finale sur la page aléatoire déterminée
                    const finalResponse = await fetch(`${url}&page=${randomPage}`);
                    const finalData = await finalResponse.json();

                    // Étape 4 : Filtrer pour s'assurer que le film possède bien un résumé et un poster valide
                    const filteredList = finalData.results.filter(m => m.overview && m.poster_path);

                    if (filteredList.length === 0) {
                        showError();
                        return;
                    }

                    // Étape 5 : Sélectionner un index aléatoire dans la liste finale filtrée
                    const randomIndex = Math.floor(Math.random() * filteredList.length);
                    displayMovie(filteredList[randomIndex]);

                } catch (err) {
                    console.error("Erreur API TMDB :", err);
                    showError();
                } finally {
                    // Rétablissement de l'état du bouton
                    matchBtn.disabled = false;
                    matchBtn.textContent = "Sélectionner un film au hasard";
                }
            }

            // Met à jour l'interface avec les données structurées reçues de TMDB
            function displayMovie(movie) {
                errorMsg.style.display = 'none';

                movieTitle.textContent = movie.title;
                movieOverview.textContent = movie.overview;
                movieRating.textContent = `⭐ ${movie.vote_average.toFixed(1)}/10`;
                movieYear.textContent = movie.release_date ? movie.release_date.substring(0, 4) : 'N/A';
                movieLang.textContent = langLabels[movie.original_language] || movie.original_language.toUpperCase();
                
                // Concaténation de l'URL absolue pour l'affiche officielle
                movieImg.src = `${IMAGE_BASE_URL}${movie.poster_path}`;
                movieImg.alt = `Affiche officielle de ${movie.title}`;

                // Déclenchement de l'animation de transition asynchrone
                resultContainer.style.display = 'block';
                setTimeout(() => {
                    resultContainer.classList.add('show');
                }, 20);
            }

            // Gestion de l'affichage en cas de retour vide
            function showError() {
                resultContainer.classList.remove('show');
                resultContainer.style.display = 'none';
                errorMsg.style.display = 'block';
            }

            // Écouteur d'événement principal
            matchBtn.addEventListener('click', fetchRandomMovie);
        });
    </script>
</body>
</html>
