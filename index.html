<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CinéMatch - Trouve ton film ce soir</title>
    
    <style>
        /* Variables globales pour maintenir une cohérence dans les couleurs */
        :root {
            --bg-color: #141414;
            --card-bg: #181818;
            --accent-color: #E50914; /* Rouge Netflix */
            --accent-hover: #B81D24;
            --text-color: #FFFFFF;
            --text-muted: #AAAAAA;
            --border-color: #333333;
        }

        /* Réinitialisation de base et typographie */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }

        /* Conteneur principal */
        .container {
            width: 100%;
            max-width: 800px;
            text-align: center;
        }

        /* En-tête */
        header h1 {
            font-size: 2.5rem;
            color: var(--accent-color);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 800;
        }

        header p {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }

        /* Section des Filtres */
        .filters-section {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .filters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        .filter-group label {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filter-group select {
            background-color: #2f2f2f;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 0.75rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .filter-group select:focus {
            border-color: var(--accent-color);
        }

        /* Gros Bouton Central */
        .btn-trigger {
            background-color: var(--accent-color);
            color: var(--text-color);
            border: none;
            padding: 1rem 2rem;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            width: 100%;
            max-width: 400px;
        }

        .btn-trigger:hover {
            background-color: var(--accent-hover);
        }

        .btn-trigger:active {
            transform: scale(0.98);
        }

        /* Zone de résultat (Masquée par défaut, animée en JS) */
        .result-section {
            margin-top: 2rem;
            display: none; /* Géré par le JS */
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .result-section.show {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        /* Carte du film */
        .movie-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            text-align: left;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .movie-poster {
            width: 100%;
            height: 350px;
            object-fit: cover;
        }

        .movie-details {
            padding: 1.5rem;
        }

        .movie-title {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        /* Badges pour les métadonnées (Genre, Année, etc.) */
        .movie-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .badge {
            background-color: #2f2f2f;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .badge-accent {
            background-color: rgba(229, 9, 20, 0.2);
            color: var(--accent-color);
        }

        .movie-overview {
            color: var(--text-muted);
            line-height: 1.6;
            font-size: 1rem;
        }

        /* Message d'erreur si aucun film ne correspond */
        .no-match-message {
            color: var(--accent-color);
            font-weight: 600;
            margin-top: 2rem;
            display: none;
        }

        /* Responsive : Design adapté pour les tablettes et ordinateurs */
        @media (min-width: 600px) {
            .movie-card {
                flex-direction: row;
                height: 400px;
            }

            .movie-poster {
                width: 40%;
                height: 100%;
            }

            .movie-details {
                width: 60%;
                padding: 2rem;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }
        }
    </style>
</head>

        // 3. Fonction pour vérifier si l'année du film correspond à la tranche sélectionnée
        function checkYearRange(movieYear, selectValue) {
            if (selectValue === 'all') return true;
            if (selectValue === '90s') return movieYear >= 1990 && movieYear <= 1999;
            if (selectValue === '2000s') return movieYear >= 2000 && movieYear <= 2009;
            if (selectValue === '2010s') return movieYear >= 2010 && movieYear <= 2019;
