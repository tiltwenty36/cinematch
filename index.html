<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMatch - Find Your Movie Tonight</title>
    
    <style>
        :root {
            --bg-color: #141414;
            --card-bg: #181818;
            --accent-color: #E50914; /* Netflix Red */
            --accent-hover: #B81D24;
            --text-color: #FFFFFF;
            --text-muted: #AAAAAA;
            --border-color: #333333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5rem;
            color: var(--accent-color);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 800;
        }

        header p {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }

        .filters-section {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .filters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        .filter-group label {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filter-group select {
            background-color: #2f2f2f;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 0.75rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .filter-group select:focus {
            border-color: var(--accent-color);
        }

        .rating-range-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
        }

        .btn-trigger {
            background-color: var(--accent-color);
            color: var(--text-color);
            border: none;
            padding: 1rem 2rem;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            width: 100%;
            max-width: 400px;
        }

        .btn-trigger:hover {
            background-color: var(--accent-hover);
        }

        .btn-trigger:active {
            transform: scale(0.98);
        }

        .btn-trigger:disabled {
            background-color: #555;
            cursor: not-allowed;
        }

        .result-section {
            margin-top: 2rem;
            display: none; 
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .result-section.show {
            opacity: 1;
            transform: translateY(0);
        }

        .movie-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            text-align: left;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .movie-poster {
            width: 100%;
            height: 400px;
            object-fit: cover;
            background-color: #222;
        }

        .movie-details {
            padding: 1.5rem;
            position: relative;
        }

        .movie-title {
            font-size: 1.8rem;
            margin-bottom: 0.3rem;
            font-weight: 700;
        }

        .movie-director-runtime {
            font-size: 1rem;
            color: var(--text-muted);
            margin-bottom: 0.8rem;
        }

        .movie-director-runtime span {
            color: var(--accent-color);
            font-weight: 600;
        }

        .movie-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .badge {
            background-color: #2f2f2f;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .badge-accent {
            background-color: rgba(229, 9, 20, 0.2);
            color: var(--accent-color);
        }

        .badge-rating {
            background-color: rgba(255, 193, 7, 0.2);
            color: #ffc107;
        }

        .movie-overview {
            color: var(--text-muted);
            line-height: 1.6;
            font-size: 1rem;
            margin-bottom: 1.5rem;
        }

        .btn-watchlist {
            background-color: transparent;
            color: var(--text-color);
            border: 1px solid var(--text-color);
            padding: 0.6rem 1.2rem;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-watchlist:hover {
            background-color: var(--text-color);
            color: var(--bg-color);
        }

        .btn-watchlist.active {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
            color: var(--text-color);
        }

        .btn-watchlist.active:hover {
            background-color: var(--accent-hover);
            border-color: var(--accent-hover);
        }

        .no-match-message {
            color: #ffc107;
            font-weight: 600;
            margin-top: 2rem;
            display: none;
            background-color: rgba(255, 193, 7, 0.1);
            padding: 1rem;
            border-radius: 6px;
            border: 1px solid rgba(255, 193, 7, 0.2);
        }

        /* ==========================================
           WATCHLIST COMPONENT STYLES
           ========================================== --> */
        .watchlist-section {
            margin-top: 4rem;
            border-top: 1px solid var(--border-color);
            padding-top: 2rem;
            text-align: left;
            width: 100%;
        }

        .watchlist-section h2 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-color);
        }

        .watchlist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 1rem;
        }

        .watchlist-item {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.2s ease;
        }

        .watchlist-item:hover {
            transform: scale(1.03);
        }

        .watchlist-poster {
            width: 100%;
            height: 190px;
            object-fit: cover;
            display: block;
        }

        .watchlist-title {
            padding: 0.5rem;
            font-size: 0.85rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-color);
        }

        .btn-remove-item {
            position: absolute;
            top: 5px;
            right: 5px;
            background-color: rgba(0, 0, 0, 0.75);
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            font-size: 0.8rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s ease;
            font-weight: bold;
        }

        .btn-remove-item:hover {
            background-color: var(--accent-color);
        }

        .watchlist-empty {
            color: var(--text-muted);
            font-style: italic;
            font-size: 0.95rem;
        }

        @media (min-width: 600px) {
            .movie-card {
                flex-direction: row;
                height: 450px;
            }

            .movie-poster {
                width: 40%;
                height: 100%;
            }

            .movie-details {
                width: 60%;
                padding: 2.5rem;
                display: flex;
                flex-direction: column;
                justify-content: center;
                overflow-y: auto;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>CineMatch</h1>
            <p>Find Your Movie Tonight</p>
        </header>

        <section class="filters-section">
            <div class="filters-grid">
                <div class="filter-group">
                    <label for="genre-select">Genre</label>
                    <select id="genre-select">
                        <option value="all">All Genres</option>
                        <option value="28">Action</option>
                        <option value="35">Comedy</option>
                        <option value="18">Drama</option>
                        <option value="878">Sci-Fi</option>
                        <option value="27">Horror</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="year-select">Era</label>
                    <select id="year-select">
                        <option value="all">All Eras</option>
                        <option value="50s">50s</option>
                        <option value="60s">60s</option>
                        <option value="70s">70s</option>
                        <option value="80s">80s</option>
                        <option value="90s">90s</option>
                        <option value="2000s">2000s</option>
                        <option value="2010s">2010s</option>
                        <option value="recent">Recent (2020+)</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="lang-select">Original Language</label>
                    <select id="lang-select">
                        <option value="all">All Languages</option>
                        <option value="en">English</option>
                        <option value="fr">French</option>
                        <option value="ja">Japanese</option>
                        <option value="it">Italian</option>
                        <option value="de">German</option>
                        <option value="zh">Mandarin</option>
                        <option value="pt">Portuguese</option>
                        <option value="ru">Russian</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="country-select">Country of Origin</label>
                    <select id="country-select">
                        <option value="all">All Countries</option>
                        <option value="US">United States</option>
                        <option value="GB">United Kingdom</option>
                        <option value="FR">France</option>
                        <option value="BE">Belgium</option>
                        <option value="CH">Switzerland</option>
                        <option value="PT">Portuguese</option>
                        <option value="IT">Italy</option>
                        <option value="BR">Brazil</option>
                        <option value="DE">Germany</option>
                        <option value="CN">China</option>
                        <option value="HK">Hong Kong</option>
                        <option value="JP">Japan</option>
                        <option value="TW">Taiwan</option>
                        <option value="RU">Russia</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label>Rating Range</label>
                    <div class="rating-range-container">
                        <select id="rating-min-select">
                            <option value="1">Min: 1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                            <option value="5">5</option>
                            <option value="6">6</option>
                            <option value="7">7</option>
                            <option value="8">8</option>
                            <option value="9">9</option>
                        </select>
                        <select id="rating-max-select">
                            <option value="10">Max: 10</option>
                            <option value="9">9</option>
                            <option value="8">8</option>
                            <option value="7">7</option>
                            <option value="6">6</option>
                            <option value="5">5</option>
                            <option value="4">4</option>
                            <option value="3">3</option>
                            <option value="2">2</option>
                        </select>
                    </div>
                </div>
            </div>

            <button id="match-btn" class="btn-trigger">Roll a Random Movie</button>
        </section>

        <div id="error-msg" class="no-match-message">
            No movies match this criteria, try another combination!
        </div>

        <section id="result-container" class="result-section">
            <div class="movie-card">
                <img id="movie-img" src="" alt="Movie Poster" class="movie-poster">
                <div class="movie-details">
                    <h2 id="movie-title" class="movie-title">Movie Title</h2>
                    <div class="movie-director-runtime">
                        Director: <span id="movie-director">Unknown</span> | Runtime: <span id="movie-runtime">N/A</span>
                    </div>
                    <div class="movie-meta">
                        <span id="movie-rating" class="badge badge-rating">Rating</span>
                        <span id="movie-year" class="badge">Year</span>
                        <span id="movie-lang" class="badge">Language</span>
                    </div>
                    <p id="movie-overview" class="movie-overview">Movie description summary...</p>
                    <div>
                        <button id="watchlist-btn" class="btn-watchlist">
                            <span>🔖</span> <span id="watchlist-btn-text">Save to Watchlist</span>
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <section class="watchlist-section">
            <h2>My Watchlist</h2>
            <div id="watchlist-grid" class="watchlist-grid">
                <p class="watchlist-empty">Your watchlist is currently empty. Roll and save some movies!</p>
            </div>
        </section>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            const TMDB_API_KEY = "a22cc070653d990b7947884e821738de";
            const BASE_URL = "https://api.themoviedb.org/3";
            const IMAGE_BASE_URL = "https://image.tmdb.org/t/p/w500";

            // State Tracking Variable for the currently targeted movie selection
            let currentMovie = null;

            // DOM Reference Elements
            const genreSelect = document.getElementById('genre-select');
            const yearSelect = document.getElementById('year-select');
            const langSelect = document.getElementById('lang-select');
            const countrySelect = document.getElementById('country-select');
            const ratingMinSelect = document.getElementById('rating-min-select');
            const ratingMaxSelect = document.getElementById('rating-max-select');
            
            const matchBtn = document.getElementById('match-btn');
            const watchlistBtn = document.getElementById('watchlist-btn');
            const watchlistBtnText = document.getElementById('watchlist-btn-text');
            const watchlistGrid = document.getElementById('watchlist-grid');
            const resultContainer = document.getElementById('result-container');
            const errorMsg = document.getElementById('error-msg');

            const movieImg = document.getElementById('movie-img');
            const movieTitle = document.getElementById('movie-title');
            const movieDirector = document.getElementById('movie-director');
            const movieRuntime = document.getElementById('movie-runtime');
            const movieYear = document.getElementById('movie-year');
            const movieLang = document.getElementById('movie-lang');
            const movieRating = document.getElementById('movie-rating');
            const movieOverview = document.getElementById('movie-overview');

            const langLabels = { 
                'en': 'English', 'fr': 'French', 'ja': 'Japanese',
                'it': 'Italian', 'de': 'German', 'zh': 'Mandarin',
                'pt': 'Portuguese', 'ru': 'Russian'
            };

            // Initialize app lifecycle execution maps
            renderWatchlist();

            async function fetchRandomMovie() {
                matchBtn.disabled = true;
                matchBtn.textContent = "Rolling...";

                let url = `${BASE_URL}/discover/movie?api_key=${TMDB_API_KEY}&language=en-US&include_adult=false&sort_by=popularity.desc`;

                if (genreSelect.value !== 'all') url += `&with_genres=${genreSelect.value}`;
                if (langSelect.value !== 'all') url += `&with_original_language=${langSelect.value}`;
                if (countrySelect.value !== 'all') url += `&with_origin_country=${countrySelect.value}`;

                url += `&vote_average.gte=${ratingMinSelect.value}`;
                url += `&vote_average.lte=${ratingMaxSelect.value}`;

                if (yearSelect.value !== 'all') {
                    if (yearSelect.value === '50s') url += `&primary_release_date.gte=1950-01-01&primary_release_date.lte=1959-12-31`;
                    if (yearSelect.value === '60s') url += `&primary_release_date.gte=1960-01-01&primary_release_date.lte=1969-12-31`;
                    if (yearSelect.value === '70s') url += `&primary_release_date.gte=1970-01-01&primary_release_date.lte=1979-12-31`;
                    if (yearSelect.value === '80s') url += `&primary_release_date.gte=1980-01-01&primary_release_date.lte=1989-12-31`;
                    if (yearSelect.value === '90s') url += `&primary_release_date.gte=1990-01-01&primary_release_date.lte=1999-12-31`;
                    if (yearSelect.value === '2000s') url += `&primary_release_date.gte=2000-01-01&primary_release_date.lte=2009-12-31`;
                    if (yearSelect.value === '2010s') url += `&primary_release_date.gte=2010-01-01&primary_release_date.lte=2019-12-31`;
                    if (yearSelect.value === 'recent') url += `&primary_release_date.gte=2020-01-01`;
                }

                try {
                    const response = await fetch(url);
                    const data = await response.json();

                    if (!data.results || data.results.length === 0) {
                        showError();
                        return;
                    }

                    const maxPages = Math.min(data.total_pages, 10);
                    const randomPage = Math.floor(Math.random() * maxPages) + 1;

                    const finalResponse = await fetch(`${url}&page=${randomPage}`);
                    const finalData = await finalResponse.json();

                    const filteredList = finalData.results.filter(m => m.overview && m.poster_path);

                    if (filteredList.length === 0) {
                        showError();
                        return;
                    }

                    const randomIndex = Math.floor(Math.random() * filteredList.length);
                    const chosenMovie = filteredList[randomIndex];

                    // Combined asynchronous execution lookup data stream (Credits & Secondary Details query)
                    const details = await fetchExtendedMovieDetails(chosenMovie.id);
                    
                    currentMovie = chosenMovie; // Save structural entity context globally
                    displayMovie(chosenMovie, details.director, details.runtime);

                } catch (err) {
                    console.error("TMDB Core Engine exception handling:", err);
                    showError();
                } finally {
                    matchBtn.disabled = false;
                    matchBtn.textContent = "Roll a Random Movie";
                }
            }

            // High-fidelity integrated wrapper function mapping runtime configuration parameters
            async function fetchExtendedMovieDetails(movieId) {
                let director = "Unknown Director";
                let runtime = "N/A";
                
                try {
                    // Fetch Crew Credits
                    const creditsPromise = fetch(`${BASE_URL}/movie/${movieId}/credits?api_key=${TMDB_API_KEY}`).then(res => res.json());
                    // Fetch Core Appendices (Runtime metric calculation data payload source)
                    const mainDetailsPromise = fetch(`${BASE_URL}/movie/${movieId}?api_key=${TMDB_API_KEY}&language=en-US`).then(res => res.json());

                    const [creditsData, mainData] = await Promise.all([creditsPromise, mainDetailsPromise]);

                    if (creditsData && creditsData.crew) {
                        const target = creditsData.crew.find(m => m.job === 'Director');
                        if (target) director = target.name;
                    }

                    if (mainData && mainData.runtime) {
                        runtime = formatRuntime(mainData.runtime);
                    }
                } catch (e) {
                    console.error("Error looking up contextual sub-queries:", e);
                }

                return { director, runtime };
            }

            // Formats integer minutes to clean 'Xh Ym' standard layout
            function formatRuntime(minutes) {
                if (!minutes) return "N/A";
                const hours = Math.floor(minutes / 60);
                const remainingMinutes = minutes % 60;
                return hours > 0 ? `${hours}h ${remainingMinutes}m` : `${remainingMinutes}m`;
            }

            function displayMovie(movie, director, runtime) {
                errorMsg.style.display = 'none';

                movieTitle.textContent = movie.title;
                movieDirector.textContent = director;
                movieRuntime.textContent = runtime;
                movieOverview.textContent = movie.overview;
                movieRating.textContent = `⭐ ${movie.vote_average.toFixed(1)}/10`;
                movieYear.textContent = movie.release_date ? movie.release_date.substring(0, 4) : 'N/A';
                movieLang.textContent = langLabels[movie.original_language] || movie.original_language.toUpperCase();
                
                movieImg.src = `${IMAGE_BASE_URL}${movie.poster_path}`;
                movieImg.alt = `${movie.title} Movie Poster`;

                updateWatchlistButtonState(movie.id);

                resultContainer.style.display = 'block';
                setTimeout(() => {
                    resultContainer.classList.add('show');
                }, 20);
            }

            function showError() {
                resultContainer.classList.remove('show');
                resultContainer.style.display = 'none';
                errorMsg.style.display = 'block';
            }

            // ==========================================
            // WATCHLIST SYSTEM SUBSURFACE SUBSYSTEMS
            // ==========================================
            function getWatchlistData() {
                const data = localStorage.getItem('cinematch_watchlist');
                return data ? JSON.parse(data) : [];
            }

            function updateWatchlistButtonState(movieId) {
                const list = getWatchlistData();
                const exists = list.some(item => item.id === movieId);
                
                if (exists) {
                    watchlistBtn.classList.add('active');
                    watchlistBtnText.textContent = "Remove from Watchlist";
                } else {
                    watchlistBtn.classList.remove('active');
                    watchlistBtnText.textContent = "Save to Watchlist";
                }
            }

            watchlistBtn.addEventListener('click', () => {
                if (!currentMovie) return;
                
                let list = getWatchlistData();
                const index = list.findIndex(item => item.id === currentMovie.id);

                if (index > -1) {
                    list.splice(index, 1); // Remove from list if already present
                } else {
                    list.push({
                        id: currentMovie.id,
                        title: currentMovie.title,
                        poster_path: currentMovie.poster_path
                    });
                }

                localStorage.setItem('cinematch_watchlist', JSON.stringify(list));
                updateWatchlistButtonState(currentMovie.id);
                renderWatchlist();
            });

            window.removeWatchlistItem = function(movieId) {
                let list = getWatchlistData();
                list = list.filter(item => item.id !== movieId);
                localStorage.setItem('cinematch_watchlist', JSON.stringify(list));
                
                if (currentMovie && currentMovie.id === movieId) {
                    updateWatchlistButtonState(movieId);
                }
                renderWatchlist();
            };

            function renderWatchlist() {
                const list = getWatchlistData();
                watchlistGrid.innerHTML = '';

                if (list.length === 0) {
                    watchlistGrid.innerHTML = `<p class="watchlist-empty">Your watchlist is currently empty. Roll and save some movies!</p>`;
                    return;
                }

                list.forEach(movie => {
                    const el = document.createElement('div');
                    el.className = 'watchlist-item';
                    el.innerHTML = `
                        <button class="btn-remove-item" onclick="removeWatchlistItem(${movie.id})">×</button>
                        <img class="watchlist-poster" src="${IMAGE_BASE_URL}${movie.poster_path}" alt="${movie.title}">
                        <div class="watchlist-title" title="${movie.title}">${movie.title}</div>
                    `;
                    watchlistGrid.appendChild(el);
                });
            }

            matchBtn.addEventListener('click', fetchRandomMovie);
        });
    </script>
</body>
</html>
